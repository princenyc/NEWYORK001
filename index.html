<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [WAR ROOM v3.6]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --accent: #ff3e3e; --311: #00f2ff; --jobs: #bc61ff; --housing: #ff00ff; --panel: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        #map-container { flex-grow: 1; background: #000; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.4) !important; }
        .leaflet-container { background: #000 !important; }
        
        .leaflet-popup-content-wrapper { background: #111; color: #fff; border: 1px solid var(--311); border-radius: 4px; font-size: 0.7rem; }
        .sidebar, .right-panel { width: 340px; background: var(--panel); border-right: 1px solid #1a1a1a; overflow-y: auto; padding: 20px; z-index: 10; }
        .right-panel { border-right: none; border-left: 1px solid #1a1a1a; width: 380px; }
        h1 { font-size: 0.85rem; color: var(--accent); letter-spacing: 4px; margin: 0; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; font-weight: 900; }
        .status { font-size: 0.5rem; color: #0f0; font-family: monospace; text-shadow: 0 0 5px #0f0; margin: 10px 0; }
        
        .card { background: #050505; border: 1px solid #111; border-radius: 2px; padding: 12px; margin-bottom: 8px; border-left: 3px solid transparent; }
        .card.gov { border-left-color: var(--311); }
        .card.job { border-left-color: var(--jobs); }
        .card.housing { border-left-color: var(--housing); }
        .card h3 { font-size: 0.75rem; margin: 0 0 4px 0; color: #eee; line-height: 1.2; font-weight: 700; }
        .card .meta { font-size: 0.45rem; color: #555; text-transform: uppercase; margin-bottom: 3px; font-weight: 800; }
        .card .desc { font-size: 0.6rem; color: #777; line-height: 1.3; margin-top: 4px; border-top: 1px solid #111; padding-top: 4px; }
        
        .btn { display: inline-block; margin-top: 8px; padding: 4px 8px; font-size: 0.55rem; color: var(--jobs); border: 1px solid var(--jobs); text-decoration: none; text-transform: uppercase; font-weight: 900; transition: 0.2s; cursor: pointer; }
        .btn:hover { background: var(--jobs); color: #000; }
        
        #debug { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #555; z-index: 2000; pointer-events: none; background: rgba(0,0,0,0.8); padding: 4px 8px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="sidebar"><h1>NYC OS : SIGNAL</h1><div class="status" id="status-l">GRID READY</div><h2>Housing Intel</h2><div id="housing-feed"></div></div>
    <div id="map-container"><div id="map"></div></div>
    <div class="right-panel"><div class="status" id="status-r">HEALTH: NOMINAL</div><h2>Jobs Market</h2><div id="jobs-feed"></div><h2>311 Vitals</h2><div id="gov-feed"></div></div>
    <div id="debug">v3.6 LOG: STANDBY</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { gov: L.layerGroup(), jobs: L.layerGroup(), housing: L.layerGroup() };
    const PROXIES = ["https://api.allorigins.win/get?url=", "https://corsproxy.io/?"];

    function log(msg) { document.getElementById('debug').innerText = "v3.6: " + msg; }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        sync();
    }

    async function sync() { fetch311(); fetchJobs(0); fetchHousing(0); }

    // RESTORED 311 Logic
    async function fetch311() {
        const dateStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${dateStr}'&$limit=50&$order=created_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(sig => {
                if (sig.latitude) {
                    L.circleMarker([sig.latitude, sig.longitude], { radius: 6, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(layers.gov)
                    .bindPopup(`<b>${sig.complaint_type}</b><br>${sig.descriptor || ''}`);
                }
                addCard('gov-feed', sig.complaint_type, sig.agency, `${sig.descriptor || 'Pothole'} | ${sig.incident_address || 'N/A'}`, 'gov');
            });
        } catch (e) { log("311 restricted"); }
    }

    // FAILOVER HOUSING
    async function fetchHousing(pIdx) {
        const target = "https://data.cityofnewyork.us/resource/9ck6-pbiq.json?$limit=8";
        try {
            const res = await fetch(PROXIES[pIdx] + encodeURIComponent(target));
            const json = await res.json();
            const data = (pIdx === 0) ? JSON.parse(json.contents) : json;
            data.forEach(h => {
                if (h.latitude) {
                    L.circleMarker([h.latitude, h.longitude], { radius: 8, fillColor: 'var(--housing)', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(layers.housing);
                }
                addCard('housing-feed', h.project_name, "LOTTERY", h.address, 'housing');
            });
            log("Housing Active");
        } catch (e) {
            if (pIdx < PROXIES.length - 1) fetchHousing(pIdx + 1);
            else injectFallbackHousing();
        }
    }

    // FAILOVER JOBS
    async function fetchJobs(pIdx) {
        const target = "https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=10";
        try {
            const res = await fetch(PROXIES[pIdx] + encodeURIComponent(target));
            const json = await res.json();
            const data = (pIdx === 0) ? JSON.parse(json.contents) : json;
            data.forEach(job => {
                const jobId = job.job_id || "0";
                const applyLink = `https://cityjobs.nyc.gov/jobs/${jobId}`;
                const descText = `${job.job_category || 'Admin'} | <a href="${applyLink}" target="_blank" class="btn">View Specs</a>`;
                addCard('jobs-feed', job.business_title, job.agency, descText, 'job');
            });
            log("Jobs Active");
        } catch (e) {
            if (pIdx < PROXIES.length - 1) fetchJobs(pIdx + 1);
            else injectFallbackJobs();
        }
    }

    function injectFallbackJobs() {
        log("Jobs Offline: Injecting Fallback");
        const fallbacks = [
            {title: "Emergency Services Dispatcher", agency: "NYPD", cat: "Public Safety"},
            {title: "Associate Staff Analyst", agency: "DOT", cat: "Engineering"}
        ];
        fallbacks.forEach(j => addCard('jobs-feed', j.title, j.agency, `${j.cat} | <a href='https://cityjobs.nyc.gov/' target='_blank' class='btn'>View Portal</a>`, 'job'));
    }

    function injectFallbackHousing() {
        addCard('housing-feed', "Harlem Green Phase II", "Manhattan", "125th St & Lex", 'housing');
        addCard('housing-feed', "Bed-Stuy Residences", "Brooklyn", "Fulton St", 'housing');
    }

    function addCard(id, title, meta, desc, type) {
        const div = document.createElement('div');
        div.className = `card ${type}`;
        div.innerHTML = `<div class="meta">${meta}</div><h3>${title}</h3><div class="desc">${desc}</div>`;
        document.getElementById(id).appendChild(div);
    }

    initMap();
</script>
</body>
</html>
