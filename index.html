<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [WAR ROOM v6.0]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050505; --accent: #ff3e3e; --311: #00f2ff; --news: #ff4444; --jobs: #bc61ff; --housing: #00ff88; --panel: rgba(15, 15, 15, 0.95); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Column Layout */
        .sidebar { width: 380px; height: 100vh; background: #0a0a0a; border-right: 1px solid #222; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .right-panel { width: 420px; height: 100vh; background: #0a0a0a; border-left: 1px solid #222; overflow-y: auto; padding: 20px; z-index: 10; }
        #map-container { flex-grow: 1; position: relative; background: #111; }
        #map { height: 100%; width: 100%; }
        .leaflet-tile { filter: brightness(0.35) contrast(1.2) grayscale(1) invert(1) opacity(0.5); }

        /* Typography & UI */
        h1 { font-size: 1rem; color: var(--accent); letter-spacing: 3px; margin: 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        h2 { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 15px 0; }
        .status-bar { font-size: 0.6rem; color: #0f0; font-family: monospace; margin: 10px 0; }
        
        /* Tactical Cards */
        .card { background: #151515; border: 1px solid #222; border-radius: 6px; padding: 15px; margin-bottom: 12px; transition: 0.2s; border-left: 3px solid transparent; }
        .card:hover { border-color: #444; background: #1a1a1a; }
        .card.news { border-left-color: var(--news); }
        .card.job { border-left-color: var(--jobs); }
        .card.gov { border-left-color: var(--311); }
        .card.house { border-left-color: var(--housing); }
        
        .card h3 { font-size: 0.85rem; margin: 0 0 5px 0; line-height: 1.3; }
        .card a { color: #eee; text-decoration: none; font-weight: 700; }
        .card a:hover { color: var(--accent); }
        .card .meta { font-size: 0.6rem; text-transform: uppercase; font-weight: 800; color: #555; margin-bottom: 5px; }
        
        .tag { font-size: 0.5rem; padding: 2px 5px; border-radius: 3px; background: #333; color: #fff; margin-right: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>THE SIGNAL : NYC</h1>
        <div class="status-bar" id="status-left">SCANNING NEWS & POLICY...</div>
        
        <h2>City Council Policy</h2>
        <div id="policy-feed"></div>

        <h2>Community News</h2>
        <div id="news-feed"></div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="right-panel">
        <div class="status-bar" id="status-right">MONITORING CITY VITALS...</div>

        <h2>Economy : Active Job Openings</h2>
        <div id="jobs-feed"></div>

        <h2>City Health : 311 Reports (24h)</h2>
        <div id="gov-feed"></div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { news: L.layerGroup(), gov: L.layerGroup(), jobs: L.layerGroup() };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        
        fetchAllData();
    }

    async function fetchAllData() {
        fetch311();
        fetchJobs();
        fetchNews();
    }

    // 1. City Health: 311 Signals
    async function fetch311() {
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('.')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${yesterday}'&$limit=20&$order=created_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(item => {
                if (item.latitude) {
                    L.circleMarker([item.latitude, item.longitude], { radius: 6, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.8 }).addTo(layers.gov)
                    .bindPopup(`<b>311: ${item.complaint_type}</b><br>${item.incident_address}`);
                }
                addCard('gov-feed', item.complaint_type, item.agency, item.incident_address || 'Multiple Locations', null, 'gov');
            });
            document.getElementById('status-right').innerText = `VITALS: ${data.length} LIVE SIGNALS`;
        } catch (e) { console.error("311 Error"); }
    }

    // 2. Economy: City Job Postings
    async function fetchJobs() {
        // Querying Jobs NYC Postings API
        const api = `https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=10&$order=posting_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(job => {
                addCard('jobs-feed', job.business_title, job.agency, job.job_category, `https://www.nyc.gov/jobs`, 'job');
            });
        } catch (e) { console.error("Jobs Error"); }
    }

    // 3. Systemic: News
    async function fetchNews() {
        const sources = [
            { name: "The City", url: "https://www.thecity.nyc/rss/index.xml" },
            { name: "Amsterdam News", url: "https://amsterdamnews.com/feed/" }
        ];
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        for (const src of sources) {
            try {
                const res = await fetch(proxy + encodeURIComponent(src.url));
                const data = await res.json();
                data.items.slice(0, 5).forEach(item => {
                    addCard('news-feed', item.title, src.name, item.description.replace(/<[^>]*>?/gm, '').substring(0, 80) + '...', item.link, 'news');
                });
            } catch (e) { }
        }
    }

    function addCard(containerId, title, meta, desc, link, type) {
        const container = document.getElementById(containerId);
        const card = document.createElement('div');
        card.className = `card ${type}`;
        card.innerHTML = `
            <div class="meta">${meta}</div>
            <h3>${link ? `<a href="${link}" target="_blank">${title}</a>` : title}</h3>
            <div style="font-size:0.7rem; color:#888;">${desc}</div>
        `;
        container.appendChild(card);
    }

    initMap();
</script>
</body>
</html>
