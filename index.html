<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [WAR ROOM v1.1]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #030303; --accent: #ff0000; --311: #00f2ff; --news: #ff4444; --jobs: #bc61ff; --housing: #00ff88; --panel: rgba(10, 10, 10, 0.98); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* V1.1 FIXED MAP: Deep Obsidian High-Contrast */
        #map-container { flex-grow: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #000; }
        .leaflet-tile-container { filter: invert(100%) hue-rotate(180deg) brightness(1.1) contrast(1.3); }
        .leaflet-container { background: #000 !important; }

        /* UI Structure */
        .sidebar { width: 380px; background: #050505; border-right: 1px solid #222; overflow-y: auto; padding: 20px; z-index: 10; }
        .right-panel { width: 420px; background: #050505; border-left: 1px solid #222; overflow-y: auto; padding: 20px; z-index: 10; }
        
        h1 { font-size: 0.9rem; color: var(--accent); letter-spacing: 4px; margin: 0; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 0; }
        .status-pulse { font-size: 0.6rem; color: #0f0; font-family: monospace; text-shadow: 0 0 5px #0f0; }

        /* Cards & Pins */
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 4px; padding: 15px; margin-bottom: 10px; border-left: 3px solid transparent; }
        .card.gov { border-left-color: var(--311); box-shadow: -5px 0 10px rgba(0, 242, 255, 0.1); }
        .card.job { border-left-color: var(--jobs); }
        .card.transit { border-left-color: var(--transit); }
        
        .card h3 { font-size: 0.85rem; margin: 0 0 5px 0; font-weight: 700; color: #fff; }
        .card a { color: inherit; text-decoration: none; }
        .card a:hover { color: var(--accent); }
        .card .meta { font-size: 0.55rem; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>NYC OS : SIGNAL</h1>
        <div class="status-pulse" id="status-left">SCANNING GRID...</div>
        
        <h2>MTA System Status</h2>
        <div id="transit-feed"></div>

        <h2>Community Intelligence</h2>
        <div id="news-feed"></div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="right-panel">
        <div class="status-pulse" id="status-right">SYSTEM HEALTH: NOMINAL</div>

        <h2>Jobs NYC : Active Market</h2>
        <div id="jobs-feed"></div>

        <h2>311 Signals : Real-Time</h2>
        <div id="gov-feed"></div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { news: L.layerGroup(), gov: L.layerGroup(), jobs: L.layerGroup(), transit: L.layerGroup() };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        fetchSignals();
    }

    async function fetchSignals() {
        fetch311();
        fetchMTA();
        fetchJobs();
    }

    // 1. Live 311 Grid
    async function fetch311() {
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('.')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${yesterday}'&$limit=20&$order=created_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(sig => {
                if (sig.latitude) {
                    L.circleMarker([sig.latitude, sig.longitude], { radius: 7, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(layers.gov)
                    .bindPopup(`<b>${sig.complaint_type}</b><br>${sig.incident_address}`);
                }
                addCard('gov-feed', sig.complaint_type, `${sig.agency} | ${sig.borough}`, sig.descriptor, null, 'gov');
            });
        } catch (e) { console.warn("311 Down"); }
    }

    // 2. Real-Time Transit Alerts
    async function fetchMTA() {
        const api = "https://api.rss2json.com/v1/api.json?rss_url=https://www.mymtaalerts.com/rss/allalerts";
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.items.slice(0, 5).forEach(alert => {
                addCard('transit-feed', alert.title, "MTA ALERT", alert.description.substring(0, 100), alert.link, 'transit');
            });
        } catch (e) { }
    }

    // 3. Jobs Market
    async function fetchJobs() {
        const api = `https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=8&$order=posting_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(job => {
                addCard('jobs-feed', job.business_title, job.agency, job.job_category, `https://www.nyc.gov/jobs`, 'job');
            });
        } catch (e) { }
    }

    function addCard(containerId, title, meta, desc, link, type) {
        const div = document.createElement('div');
        div.className = `card ${type}`;
        div.innerHTML = `<div class="meta">${meta}</div><h3>${link ? `<a href="${link}" target="_blank">${title}</a>` : title}</h3><div style="font-size:0.7rem; color:#666;">${desc}</div>`;
        document.getElementById(containerId).appendChild(div);
    }

    initMap();
</script>
</body>
</html>
