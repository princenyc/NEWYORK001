<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [WAR ROOM v5.2]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --accent: #ff3e3e; --311: #00f2ff; --jobs: #bc61ff; --cams: #ffea00; --panel: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        #map-container { flex-grow: 1; background: #000; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.4) !important; }
        
        .cam-frame { width: 300px; height: 225px; background: #111; border: 1px solid var(--cams); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cam-frame img { width: 100%; height: 100%; object-fit: cover; }

        .sidebar, .right-panel { width: 340px; background: var(--panel); border-right: 1px solid #1a1a1a; overflow-y: auto; padding: 20px; z-index: 10; }
        .right-panel { border-right: none; border-left: 1px solid #1a1a1a; width: 380px; }
        
        .section-header { font-size: 0.85rem; letter-spacing: 4px; margin: 20px 0 10px 0; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; }
        .header-cams { color: var(--cams); }
        .header-jobs { color: var(--jobs); }
        .header-311 { color: var(--311); }

        .feed-content { display: none; margin-bottom: 20px; }
        .active .feed-content { display: block; }
        .status { font-size: 0.5rem; color: #0f0; font-family: monospace; text-shadow: 0 0 5px #0f0; margin: 10px 0; }
        .card { background: #050505; border: 1px solid #111; border-radius: 2px; padding: 12px; margin-bottom: 8px; border-left: 3px solid transparent; }
        .card.gov { border-left-color: var(--311); }
        .card.job { border-left-color: var(--jobs); }
        .card.cams { border-left-color: var(--cams); }
        
        .leaflet-popup-content-wrapper { background: #111; color: #fff; border-radius: 0; padding: 0; border: 1px solid #333; }
        .leaflet-popup-content { margin: 10px; width: 300px !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1 style="font-size: 1rem; color: var(--accent); letter-spacing: 5px;">NYC OS : SIGNAL</h1>
        <div class="status">EYES ON GRID // v5.2 ARTERY</div>
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-cams">Surveillance</div>
            <div id="cam-list" class="feed-content"></div>
        </div>
    </div>
    <div id="map-container"><div id="map"></div></div>
    <div class="right-panel">
        <div class="status">HEALTH: NOMINAL</div>
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-jobs">Jobs Market</div>
            <div id="jobs-feed" class="feed-content"></div>
        </div>
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-311">311 Vitals</div>
            <div id="gov-feed" class="feed-content"></div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { gov: L.layerGroup(), jobs: L.layerGroup(), cams: L.layerGroup(), traffic: L.layerGroup() };
    const PROXY = "https://api.allorigins.win/get?url=";

    const CAMS = [
        { name: "Times Sq - 42nd St", lat: 40.7550, lon: -73.9868, id: "461" },
        { name: "5th Ave & 59th St", lat: 40.7644, lon: -73.9730, id: "467" },
        { name: "Canal St & Bowery", lat: 40.7153, lon: -73.9961, id: "193" }
    ];

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        deployCams();
        sync();
        setInterval(fetchTraffic, 60000);
    }

    function deployCams() {
        CAMS.forEach(cam => {
            const camUrl = `http://207.251.86.238/cctv${cam.id}.jpg?t=${Date.now()}`;
            const proxiedUrl = `https://images.weserv.nl/?url=${encodeURIComponent(camUrl)}&w=300&h=225&fit=cover`;
            
            const popup = `
                <div class="cam-frame">
                    <img src="${proxiedUrl}" onerror="this.outerHTML='<div style=\'color:var(--cams);font-size:10px;\'>ENCRYPTED SIGNAL: NODE ${cam.id}</div>'">
                </div>
                <div style="font-size:10px; color:var(--cams); padding-top:5px;">LOCATION: ${cam.name}</div>`;
            
            L.circleMarker([cam.lat, cam.lon], { radius: 8, fillColor: 'var(--cams)', color: '#fff', weight: 2, fillOpacity: 1 }).addTo(layers.cams).bindPopup(popup);
            addCard('cam-list', cam.name, "SECURE NODE", `ID: ${cam.id}`, 'cams');
        });
    }

    async function fetchTraffic() {
        layers.traffic.clearLayers();
        const api = "https://data.cityofnewyork.us/resource/i4gi-tjb9.json?$limit=100";
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(link => {
                if (link.link_points) {
                    const coords = link.link_points.split(' ').map(p => p.split(',').reverse());
                    let color = "#0f0";
                    const speed = parseFloat(link.speed);
                    if (speed < 15) color = "#f00";
                    else if (speed < 30) color = "#ff0";
                    
                    L.polyline(coords, { color: color, weight: 5, opacity: 0.7 }).addTo(layers.traffic)
                    .bindPopup(`<b>${link.link_name}</b><br>Speed: ${speed} MPH`);
                }
            });
        } catch (e) { console.error("Traffic Blocked"); }
    }

    async function sync() { fetch311(); fetchJobs(); fetchTraffic(); }

    async function fetch311() {
        const dateStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${dateStr}'&$limit=40`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            data.forEach(sig => {
                if (sig.latitude) {
                    L.circleMarker([sig.latitude, sig.longitude], { radius: 6, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(layers.gov)
                    .bindPopup(`<b>${sig.complaint_type}</b><br>${sig.descriptor || ''}`);
                    addCard('gov-feed', sig.complaint_type, sig.agency, `${sig.descriptor || 'Pothole'}`, 'gov');
                }
            });
        } catch (e) {}
    }

    async function fetchJobs() {
        const api = "https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=8";
        try {
            const res = await fetch(PROXY + encodeURIComponent(api));
            const json = await res.json();
            const data = JSON.parse(json.contents);
            data.forEach(job => addCard('jobs-feed', job.business_title, job.agency, "Market Pulse Active", 'job'));
        } catch (e) {}
    }

    function addCard(id, title, meta, desc, type) {
        const div = document.createElement('div');
        div.className = `card ${type}`;
        div.innerHTML = `<div class="meta">${meta}</div><h3>${title}</h3><div style="font-size:0.6rem; color:#444;">${desc}</div>`;
        document.getElementById(id).appendChild(div);
    }

    initMap();
</script>
</body>
</html>
