<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [v6.0 SECTOR-ZERO]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --accent: #ff3e3e; --311: #00f2ff; --jobs: #bc61ff; --cams: #ffea00; --gov: #ff9900; --wifi: #ffffff; --shelter: #00ff00; --panel: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        #map-container { flex-grow: 1; background: #000; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.4) !important; }
        
        /* SIDE PANELS */
        .sidebar, .right-panel { width: 340px; background: var(--panel); border-right: 1px solid #1a1a1a; overflow-y: auto; padding: 20px; z-index: 10; }
        .right-panel { border-right: none; border-left: 1px solid #1a1a1a; width: 380px; }
        
        /* CHROMATIC HUD VITALS */
        .hud-vitals { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .v-node { flex: 1; text-align: center; border: 1px solid #111; padding: 5px; border-radius: 2px; }
        .v-node .val { font-size: 0.9rem; font-weight: 900; font-family: monospace; }
        .v-node .lbl { font-size: 0.45rem; color: #444; text-transform: uppercase; margin-top: 2px; }
        #count-311 { color: var(--311); } #count-wifi { color: var(--wifi); } #count-shelter { color: var(--shelter); }

        .section-header { font-size: 0.85rem; letter-spacing: 4px; margin: 20px 0 10px 0; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; }
        .header-wifi { color: var(--wifi); } .header-jobs { color: var(--jobs); } .header-311 { color: var(--311); } .header-gov { color: var(--gov); } .header-shelter { color: var(--shelter); }

        .feed-content { display: none; margin-bottom: 20px; }
        .active .feed-content { display: block; }
        .card { background: #050505; border: 1px solid #111; border-radius: 2px; padding: 12px; margin-bottom: 8px; border-left: 3px solid transparent; }
        .card.gov { border-left-color: var(--311); } .card.job { border-left-color: var(--jobs); } .card.wifi { border-left-color: var(--wifi); } .card.shelter { border-left-color: var(--shelter); }
        
        .btn { display: inline-block; margin-top: 8px; padding: 4px 8px; font-size: 0.55rem; color: #fff; border: 1px solid #444; text-decoration: none; text-transform: uppercase; font-weight: 900; cursor: pointer; }
        .leaflet-popup-content-wrapper { background: #111; color: #fff; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1 style="font-size: 1rem; color: var(--accent); letter-spacing: 5px;">NYC OS : SIGNAL</h1>
        <div class="hud-vitals">
            <div class="v-node"><div class="val" id="count-311">0</div><div class="lbl">311 Vitals</div></div>
            <div class="v-node"><div class="val" id="count-wifi">0</div><div class="lbl">Digital</div></div>
            <div class="v-node"><div class="val" id="count-shelter">0</div><div class="lbl">Shelter</div></div>
        </div>
        
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-shelter">Emergency Shelters</div>
            <div id="shelter-feed" class="feed-content"></div>
        </div>

        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-wifi">Digital Skeleton</div>
            <div id="wifi-feed" class="feed-content"></div>
        </div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <div class="right-panel">
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-jobs">Jobs Market</div>
            <div id="jobs-feed" class="feed-content"></div>
        </div>

        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header header-311">311 Vitals</div>
            <div id="gov-feed" class="feed-content"></div>
        </div>
        
        <div class="section-container active" onclick="this.classList.toggle('active')">
            <div class="section-header" style="color:var(--cams)">Orbital Radar</div>
            <div class="feed-content"><img src="https://radar.weather.gov/ridge/standard/KOKX_loop.gif" style="width:100%; border:1px solid #333;"></div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { gov: L.layerGroup(), jobs: L.layerGroup(), wifi: L.layerGroup(), shelter: L.layerGroup() };
    const PROXY = "https://api.allorigins.win/get?url=";

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        sync();
    }

    async function sync() { fetch311(); fetchJobs(); fetchWifi(); fetchShelters(); }

    async function fetchShelters() {
        try {
            const res = await fetch("https://data.cityofnewyork.us/resource/7ax3-v6p9.json?$limit=50");
            const data = await res.json();
            document.getElementById('count-shelter').innerText = data.length;
            data.forEach(s => {
                if (s.latitude) {
                    L.circleMarker([s.latitude, s.longitude], { radius: 7, fillColor: 'var(--shelter)', color: '#fff', weight: 2, fillOpacity: 0.9 })
                    .addTo(layers.shelter).bindPopup(`<b>Emergency Shelter</b><br>${s.center_name || 'Active Center'}<br>${s.address || ''}`);
                    addCard('shelter-feed', s.center_name || 'Active Center', s.borough, s.address, 'shelter');
                }
            });
        } catch(e) { document.getElementById('count-shelter').innerText = "OFFLINE"; }
    }

    async function fetchWifi() {
        try {
            const res = await fetch("https://data.cityofnewyork.us/resource/y979-4p5r.json?$limit=80");
            const data = await res.json();
            document.getElementById('count-wifi').innerText = data.length;
            data.forEach(node => {
                if (node.latitude) {
                    L.circleMarker([node.latitude, node.longitude], { radius: 3, fillColor: 'var(--wifi)', color: '#fff', weight: 1, fillOpacity: 0.5 })
                    .addTo(layers.wifi).bindPopup(`<b>Public Hotspot</b><br>${node.location}`);
                }
            });
            addCard('wifi-feed', "Digital Vitals Active", "HOTSPOTS", "Nodes Mapped", 'wifi');
        } catch(e) { document.getElementById('count-wifi').innerText = "OFFLINE"; }
    }

    async function fetch311() {
        const dateStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        try {
            const res = await fetch(`https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${dateStr}'&$limit=50`);
            const data = await res.json();
            document.getElementById('count-311').innerText = data.length;
            data.forEach(sig => {
                if (sig.latitude) {
                    L.circleMarker([sig.latitude, sig.longitude], { radius: 6, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.8 }).addTo(layers.gov);
                    addCard('gov-feed', sig.complaint_type, sig.agency, sig.descriptor || 'Active', 'gov');
                }
            });
        } catch (e) { document.getElementById('count-311').innerText = "OFFLINE"; }
    }

    async function fetchJobs() {
        try {
            const res = await fetch(PROXY + encodeURIComponent("https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=8"));
            const json = await res.json();
            const data = JSON.parse(json.contents);
            document.getElementById('jobs-feed').innerHTML = '';
            data.forEach(job => {
                const link = `https://cityjobs.nyc.gov/jobs/${job.job_id}`;
                addCard('jobs-feed', job.business_title, job.agency, `<a href="${link}" target="_blank" class="btn">View Specs</a>`, 'job');
            });
        } catch (e) { addCard('jobs-feed', "Market Briefing", "ARCHIVE", `<a href="https://cityjobs.nyc.gov/" target="_blank" class="btn">Portal Link</a>`, 'job'); }
    }

    function addCard(id, title, meta, desc, type) {
        const div = document.createElement('div');
        div.className = `card ${type}`;
        div.innerHTML = `<div class="meta">${meta}</div><h3>${title}</h3><div style="font-size:0.6rem;">${desc}</div>`;
        document.getElementById(id).appendChild(div);
    }

    initMap();
</script>
</body>
</html>
