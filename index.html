<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SIGNAL: NYC OS [WAR ROOM v1.8]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #000; --accent: #ff3e3e; --311: #00f2ff; --jobs: #bc61ff; --transit: #ff9900; --panel: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* MAP OVERRIDE */
        #map-container { flex-grow: 1; background: #000; position: relative; }
        #map { height: 100%; width: 100%; background: #000 !important; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.4) !important; }
        .leaflet-container { background: #000 !important; }

        .sidebar, .right-panel { width: 340px; background: var(--panel); border-right: 1px solid #1a1a1a; overflow-y: auto; padding: 20px; z-index: 10; }
        .right-panel { border-right: none; border-left: 1px solid #1a1a1a; width: 380px; }
        
        h1 { font-size: 0.85rem; color: var(--accent); letter-spacing: 4px; margin: 0; text-transform: uppercase; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; font-weight: 900; }
        h2 { font-size: 0.55rem; color: #444; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px 0; }
        .status { font-size: 0.5rem; color: #0f0; font-family: monospace; text-shadow: 0 0 5px #0f0; margin: 5px 0 10px 0; }

        .card { background: #050505; border: 1px solid #111; border-radius: 2px; padding: 12px; margin-bottom: 8px; border-left: 3px solid transparent; }
        .card.gov { border-left-color: var(--311); }
        .card.job { border-left-color: var(--jobs); }
        .card.transit { border-left-color: var(--transit); }
        
        .card h3 { font-size: 0.75rem; margin: 0 0 4px 0; color: #eee; line-height: 1.2; font-weight: 700; }
        .card .meta { font-size: 0.45rem; color: #555; text-transform: uppercase; margin-bottom: 3px; font-weight: 800; }
        .card .desc { font-size: 0.6rem; color: #444; line-height: 1.3; }

        /* Debug Overlay */
        #debug { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #555; z-index: 2000; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>NYC OS : SIGNAL</h1>
        <div class="status" id="status-l">INITIATING GRID SCAN...</div>
        <h2>MTA System Pulse</h2>
        <div id="transit-feed"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <div class="right-panel">
        <div class="status" id="status-r">HEALTH: NOMINAL</div>
        <h2>Economy : Jobs</h2>
        <div id="jobs-feed"></div>
        <h2>Vitals : 311 Signals</h2>
        <div id="gov-feed"></div>
    </div>

    <div id="debug">v1.8 LOG: STANDBY</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const NYC_CENTER = [40.7128, -74.0060]; 
    let map, layers = { gov: L.layerGroup(), jobs: L.layerGroup(), transit: L.layerGroup() };

    function log(msg) { document.getElementById('debug').innerText = "v1.8 LOG: " + msg; console.log(msg); }

    function initMap() {
        log("Initializing Map...");
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        sync();
    }

    async function sync() {
        log("Starting Data Sync...");
        fetch311();
        fetchJobs();
        fetchMTA();
    }

    // 1. TACTICAL 311 SCAN (Direct NYC Open Data)
    async function fetch311() {
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('.')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${yesterday}'&$limit=50&$order=created_date DESC`;
        
        try {
            const res = await fetch(api);
            if (!res.ok) throw new Error("NYC API Response Error");
            const data = await res.json();
            log(`311 Loaded: ${data.length} items`);
            
            data.forEach(sig => {
                if (sig.latitude) {
                    L.circleMarker([sig.latitude, sig.longitude], { radius: 6, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(layers.gov)
                    .bindPopup(`<b>${sig.complaint_type}</b><br>${sig.incident_address}`);
                }
                addCard('gov-feed', sig.complaint_type, `${sig.agency} | ${sig.borough}`, sig.descriptor, 'gov');
            });
            document.getElementById('status-r').innerText = `SIGNALS DETECTED: ${data.length}`;
        } catch (e) { 
            log("311 Error: " + e.message);
            document.getElementById('status-r').innerText = "311 SIGNAL BLOCKED"; 
        }
    }

    // 2. JOBS SCAN
    async function fetchJobs() {
        const api = `https://data.cityofnewyork.us/resource/kv7j-sfdc.json?$limit=8&$order=posting_date DESC`;
        try {
            const res = await fetch(api);
            const data = await res.json();
            log(`Jobs Loaded: ${data.length} items`);
            data.forEach(job => addCard('jobs-feed', job.business_title, job.agency, job.job_category, 'job'));
        } catch (e) { log("Jobs Error: " + e.message); }
    }

    // 3. MTA SCAN (Corsproxy.io Patch)
    async function fetchMTA() {
        const target = "https://www.mymtaalerts.com/rss/allalerts";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(target);
        
        try {
            const res = await fetch(proxyUrl);
            const text = await res.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");
            
            log(`MTA Loaded: ${items.length} alerts`);
            
            Array.from(items).slice(0, 5).forEach(item => {
                const title = item.querySelector("title").textContent;
                const desc = item.querySelector("description").textContent.substring(0, 70);
                addCard('transit-feed', title, "MTA // ALERT", desc, 'transit');
            });
            document.getElementById('status-l').innerText = "GRID PULSE: ACTIVE";
        } catch (e) { 
            log("MTA Error: " + e.message);
            document.getElementById('status-l').innerText = "TRANSIT DATA ERROR"; 
        }
    }

    function addCard(id, title, meta, desc, type) {
        const div = document.createElement('div');
        div.className = `card ${type}`;
        div.innerHTML = `<div class="meta">${meta}</div><h3>${title}</h3><div class="desc">${desc}</div>`;
        document.getElementById(id).appendChild(div);
    }

    initMap();
</script>
</body>
</html>
