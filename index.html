<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SIGNAL: NYC OS [ALPHA]</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050505; --accent: #ff3e3e; --311: #00f2ff; --news: #ff4444; --transit: #ff9900; --panel: rgba(15, 15, 15, 0.98); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Tactical Map: High-Contrast "World Monitor" Style */
        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }
        .leaflet-tile { filter: brightness(0.4) contrast(1.2) grayscale(1) invert(1) opacity(0.6); }

        /* Mobile-First HUD: Bottom Sheet Pattern */
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50%;
            background: var(--panel); border-top: 1px solid #333; border-radius: 20px 20px 0 0;
            z-index: 1000; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; transform: translateY(85%); /* Collapsed by default */
        }
        .bottom-sheet.expanded { transform: translateY(0); }
        
        .grabber { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 12px auto; cursor: pointer; }
        
        .hud-header { padding: 0 20px 15px 20px; border-bottom: 1px solid #222; }
        .hud-header h1 { font-size: 0.9rem; letter-spacing: 2px; color: var(--accent); margin: 0; text-transform: uppercase; }
        .status-pulse { font-size: 0.6rem; color: #0f0; font-family: monospace; margin-top: 4px; }

        .content-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        /* Layer Toggles: Corner-Anchored HUD */
        .layer-controls { position: fixed; top: 20px; right: 20px; z-index: 1001; display: flex; flex-direction: column; gap: 10px; }
        .btn-hex { width: 45px; height: 45px; background: var(--panel); border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; backdrop-filter: blur(10px); }
        .btn-hex.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 62, 62, 0.3); }

        /* Signal Cards */
        .signal-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--311); }
        .signal-card h3 { font-size: 0.85rem; margin: 0 0 5px 0; color: #eee; }
        .signal-card .meta { font-size: 0.65rem; color: #666; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="layer-controls">
        <div id="toggle-311" class="btn-hex active" onclick="toggleLayer('311')">⚠️</div>
        <div id="toggle-transit" class="btn-hex" onclick="toggleLayer('transit')">🚇</div>
        <div id="toggle-news" class="btn-hex active" onclick="toggleLayer('news')">📡</div>
    </div>

    <div id="sheet" class="bottom-sheet">
        <div class="grabber" onclick="toggleSheet()"></div>
        <div class="hud-header">
            <h1>NYC OS : SIGNAL FEED</h1>
            <div class="status-pulse" id="status">SCANNING CITY GRID...</div>
        </div>
        <div class="content-scroll" id="feed">
            </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. NYC CORE CONFIG
    const NYC_CENTER = [40.7128, -74.0060];
    let map, layers = { '311': L.layerGroup(), 'transit': L.layerGroup(), 'news': L.layerGroup() };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView(NYC_CENTER, 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        Object.values(layers).forEach(l => l.addTo(map));
        
        fetch311Signals();
    }

    // 2. LIVE GOVERNMENT INTEL: 311 API
    async function fetch311Signals() {
        const statusEl = document.getElementById('status');
        const feedEl = document.getElementById('feed');
        
        // Querying "Problems" from last 24 hours
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('.')[0];
        const api = `https://data.cityofnewyork.us/resource/erm2-nwe9.json?$where=created_date > '${yesterday}'&$limit=50&$order=created_date DESC`;

        try {
            const res = await fetch(api);
            const data = await res.json();
            
            data.forEach(sig => {
                if (sig.latitude && sig.longitude) {
                    // Create Map Pin
                    const marker = L.circleMarker([sig.latitude, sig.longitude], {
                        radius: 8, fillColor: 'var(--311)', color: '#fff', weight: 1, fillOpacity: 0.8
                    }).addTo(layers['311']);
                    
                    marker.bindPopup(`<b>${sig.complaint_type}</b><br>${sig.incident_address || 'Multiple Locations'}`);

                    // Create Feed Card
                    const card = document.createElement('div');
                    card.className = 'signal-card';
                    card.innerHTML = `
                        <div class="meta">${sig.agency} | ${new Date(sig.created_date).toLocaleTimeString()}</div>
                        <h3>${sig.complaint_type}</h3>
                        <div style="font-size:0.7rem; color:#888;">${sig.descriptor || ''}</div>
                    `;
                    feedEl.appendChild(card);
                }
            });
            statusEl.innerText = `CITY GRID ACTIVE: ${data.length} SIGNALS LOCATED`;
        } catch (e) { statusEl.innerText = "SIGNAL INTERRUPTED"; }
    }

    // 3. HUD INTERACTION
    function toggleSheet() {
        document.getElementById('sheet').classList.toggle('expanded');
    }

    function toggleLayer(type) {
        const btn = document.getElementById(`toggle-${type}`);
        if (map.hasLayer(layers[type])) {
            map.removeLayer(layers[type]);
            btn.classList.remove('active');
        } else {
            layers[type].addTo(map);
            btn.classList.add('active');
        }
    }

    initMap();
</script>
</body>
</html>
